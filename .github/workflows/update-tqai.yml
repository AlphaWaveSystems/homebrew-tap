name: Update tqai formula

on:
  repository_dispatch:
    types: [tqai-release]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch PyPI metadata
        id: pypi
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          # Strip leading 'v' if present
          VER="${VERSION#v}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          INFO=$(curl -s "https://pypi.org/pypi/tqai/${VER}/json")
          URL=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(next(f['url'] for f in d['urls'] if f['packagetype']=='sdist'))")
          SHA=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(next(f['digests']['sha256'] for f in d['urls'] if f['packagetype']=='sdist'))")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update formula
        env:
          VERSION: ${{ steps.pypi.outputs.version }}
          URL: ${{ steps.pypi.outputs.url }}
          SHA256: ${{ steps.pypi.outputs.sha256 }}
        run: |
          sed -i "s|url \"https://files.pythonhosted.org.*\"|url \"$URL\"|" Formula/tqai.rb
          sed -i "s|sha256 \"[a-f0-9]*\"|sha256 \"$SHA256\"|" Formula/tqai.rb
          sed -i "s|version \"[0-9.]*\"|version \"$VERSION\"|" Formula/tqai.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tqai.rb
          git diff --staged --quiet || git commit -m "chore: update tqai to v${{ steps.pypi.outputs.version }}"
          git push
